<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Berlin Transit Board</title>
  <style>
:root {
  --bg:            #080907;
  --surface:       #0f110e;
  --board-bg:      #0b0d0a;
  --amber:         #f0a800;
  --amber-dim:     #5a3d00;
  --amber-bright:  #ffc840;
  --amber-faint:   rgba(240,168,0,.04);
  --border:        #1c1f18;
  --green:         #39ff88;
  --red:           #ff3c3c;
  --font:          'Courier New', Consolas, 'Lucida Console', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--amber);
  font-family: var(--font);
  overflow: hidden;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0) 0px, rgba(0,0,0,0) 1px,
    rgba(0,0,0,.07) 1px, rgba(0,0,0,.07) 2px
  );
}
#splash {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 28px; z-index: 100;
  transition: opacity .6s ease;
}
#splash.hidden { opacity: 0; pointer-events: none; }
.brand-main {
  font-size: clamp(26px, 8vw, 56px);
  font-weight: 900;
  letter-spacing: .22em;
  text-transform: uppercase;
  text-align: center;
  line-height: 1.15;
  color: var(--amber);
  text-shadow: 0 0 30px rgba(240,168,0,.3), 0 0 70px rgba(240,168,0,.1);
}
.brand-sub {
  font-size: clamp(9px, 2vw, 11px);
  letter-spacing: .28em;
  text-transform: uppercase;
  color: var(--amber-dim);
}
.splash-divider { width: 72px; height: 1px; background: var(--amber-dim); opacity: .35; }
.loc-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 34px;
  background: transparent;
  border: 1px solid var(--amber);
  color: var(--amber);
  font-family: var(--font);
  font-size: 11px;
  letter-spacing: .22em;
  text-transform: uppercase;
  cursor: pointer;
  outline: none;
  transition: background .15s, color .15s;
  -webkit-tap-highlight-color: transparent;
}
.loc-btn:hover, .loc-btn:focus { background: var(--amber); color: var(--bg); }
.loc-btn:disabled { opacity: .45; cursor: default; background: transparent; color: var(--amber); }
.splash-note {
  max-width: 280px;
  font-size: 9px; letter-spacing: .13em;
  color: var(--amber-dim);
  text-align: center; line-height: 1.9;
  text-transform: uppercase;
}
#main { display: none; flex-direction: column; height: 100%; }
header {
  flex-shrink: 0; height: 46px;
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.hdr-dot  { font-size: 10px; color: var(--amber-dim); flex-shrink: 0; }
.hdr-loc  {
  flex: 1; font-size: 11px; letter-spacing: .12em;
  text-transform: uppercase; color: var(--amber);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.hdr-clock {
  font-size: 19px; font-weight: 700;
  font-variant-numeric: tabular-nums; letter-spacing: .04em;
  color: var(--amber-bright); flex-shrink: 0;
}
.live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
  opacity: 0; transition: opacity .3s;
  box-shadow: 0 0 6px var(--green);
}
.live-dot.on { opacity: 1; }
.stops-bar {
  flex-shrink: 0; height: 38px;
  display: flex; align-items: center; gap: 5px;
  padding: 0 10px;
  background: var(--board-bg);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none;
}
.stops-bar::-webkit-scrollbar { display: none; }
.stops-label {
  flex-shrink: 0; font-size: 8px;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--amber-dim); margin-right: 4px;
}
.stop-chip {
  flex-shrink: 0; padding: 2px 10px;
  background: transparent;
  border: 1px solid var(--amber-dim);
  color: var(--amber-dim);
  font-family: var(--font); font-size: 9px;
  letter-spacing: .12em; text-transform: uppercase;
  cursor: pointer; outline: none; white-space: nowrap;
  transition: all .12s; -webkit-tap-highlight-color: transparent;
}
.stop-chip:hover, .stop-chip.active {
  border-color: var(--amber); color: var(--bg); background: var(--amber);
}
.board-hdr {
  flex-shrink: 0;
  display: grid; grid-template-columns: 58px 1fr 56px 48px;
  padding: 5px 10px;
  background: var(--surface);
  border-bottom: 2px solid var(--amber-dim);
}
.board-hdr span {
  font-size: 8px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--amber-dim);
}
.board-hdr span:nth-child(3) { text-align: center; }
.board-hdr span:nth-child(4) { text-align: right; }
.board-scroll {
  flex: 1; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--amber-dim) var(--board-bg);
}
.board-scroll::-webkit-scrollbar { width: 3px; }
.board-scroll::-webkit-scrollbar-thumb { background: var(--amber-dim); }
#board { background: var(--board-bg); min-height: 100%; }
.dep-row {
  display: grid; grid-template-columns: 58px 1fr 56px 48px;
  align-items: center; padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  animation: rowIn .2s ease forwards;
  cursor: default;
}
.dep-row:hover { background: var(--amber-faint); }
.dep-row:nth-child(even) { background: rgba(240,168,0,.015); }
@keyframes rowIn {
  from { opacity: 0; transform: translateY(-3px); }
  to   { opacity: 1; transform: translateY(0); }
}
.line-badge {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 2px 4px; border-radius: 3px;
  font-size: 11px; font-weight: 900; letter-spacing: .03em;
  min-width: 32px; max-width: 54px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.dep-dest {
  font-size: 12px; letter-spacing: .07em;
  color: var(--amber-bright);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  padding: 0 8px;
}
.dep-time-col {
  display: flex; flex-direction: column; align-items: center; gap: 1px;
}
.dep-time {
  font-size: 13px; font-weight: 700;
  font-variant-numeric: tabular-nums; letter-spacing: .04em;
  color: var(--amber);
}
.dep-delay { font-size: 9px; letter-spacing: .06em; }
.dep-delay.late { color: var(--red); }
.dep-delay.ok   { color: var(--green); }
.dep-eta { text-align: right; font-size: 12px; font-weight: 700; letter-spacing: .04em; }
.eta-now  { color: var(--red); animation: etaBlink 1s infinite; }
.eta-soon { color: #ffaa00; }
.eta-far  { color: var(--amber-dim); }
@keyframes etaBlink { 50% { opacity: .25; } }
.state-box {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; padding: 50px 20px;
  color: var(--amber-dim); font-size: 10px;
  letter-spacing: .15em; text-transform: uppercase; text-align: center;
  line-height: 1.8;
}
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--amber-dim); border-top-color: var(--amber);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
footer {
  flex-shrink: 0; height: 24px;
  display: flex; align-items: center; gap: 8px;
  padding: 0 12px;
  background: var(--surface); border-top: 1px solid var(--border);
}
.ftr-api     { flex: 1; font-size: 8px; letter-spacing: .12em; text-transform: uppercase; color: var(--amber-dim); }
.ftr-refresh { font-size: 8px; letter-spacing: .1em; text-transform: uppercase; color: var(--amber-dim); }
  </style>
</head>
<body>
<div id="splash">
  <div>
    <div class="brand-main">BERLIN<br>TRANSIT</div>
  </div>
  <div class="brand-sub">Live departures · BVG · S-Bahn</div>
  <div class="splash-divider"></div>
  <button class="loc-btn" id="locBtn" onclick="requestLocation()">◉&nbsp;&nbsp;LOCATE&nbsp;ME</button>
  <div class="splash-note" id="splashNote">
    Enable GPS to find nearby stops<br>and live departure times
  </div>
</div>
<div id="main">
  <header>
    <span class="hdr-dot">◉</span>
    <div class="hdr-loc" id="locName">Locating…</div>
    <div class="hdr-clock" id="clock">--:--:--</div>
    <div class="live-dot" id="liveDot"></div>
  </header>
  <div class="stops-bar" id="stopsBar">
    <span class="stops-label">Stops</span>
    <div class="spinner" style="width:12px;height:12px;border-width:1px;flex-shrink:0"></div>
  </div>
  <div class="board-hdr">
    <span>Line</span>
    <span>Destination</span>
    <span>Time</span>
    <span>ETA</span>
  </div>
  <div class="board-scroll">
    <div id="board">
      <div class="state-box">
        <div class="spinner"></div>
        <span>Loading stops…</span>
      </div>
    </div>
  </div>
  <footer>
    <div class="ftr-api" id="ftrApi">—</div>
    <div class="ftr-refresh" id="ftrRefresh">—</div>
  </footer>
</div>
<script>
'use strict';
let userLat,userLon;
let stops=[],currentStop=null,refreshTimer=null;
const REFRESH_MS=30000;
setInterval(()=>{
  document.getElementById('clock').textContent=
    new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
},1000);
function requestLocation(){
  const btn=document.getElementById('locBtn');
  const note=document.getElementById('splashNote');
  btn.disabled=true;
  btn.textContent='⟳  LOCATING…';
  note.textContent='Please allow location access when prompted';
  if(!navigator.geolocation){
    note.textContent='⚠ Geolocation is not supported by this browser';
    btn.disabled=false;btn.textContent='◉  LOCATE ME';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      userLat=pos.coords.latitude;
      userLon=pos.coords.longitude;
      launchBoard();
    },
    err=>{
      btn.disabled=false;btn.textContent='◉  LOCATE ME';
      note.textContent='⚠ '+(err.message||'Location access denied');
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:60000}
  );
}
window.addEventListener('DOMContentLoaded',requestLocation);
function launchBoard(){
  const splash=document.getElementById('splash');
  splash.classList.add('hidden');
  setTimeout(()=>{
    splash.style.display='none';
    document.getElementById('main').style.display='flex';
  },600);
  onLocation();
}
async function onLocation(){
  document.getElementById('locName').textContent='Berlin';
  document.getElementById('ftrApi').textContent='VBB · Berlin & Brandenburg';
  try{
    stops=await findStopsVBB(userLat,userLon);
    renderStopsBar(stops);
    if(stops.length)selectStop(stops[0]);
    else showState('No transit stops found nearby.\nTry moving closer to a stop.');
  }catch(e){
    showState('Error loading stops: '+e.message);
  }
}
async function findStopsVBB(lat,lon){
  const r=await fetch(
    `https://v6.vbb.transport.rest/stops/nearby?latitude=${lat}&longitude=${lon}&results=10&distance=1500`
  );
  const data=await r.json();
  return(Array.isArray(data)?data:[]).map(s=>({id:s.id,name:s.name}));
}
function renderStopsBar(list){
  const bar=document.getElementById('stopsBar');
  if(!list.length){
    bar.innerHTML='<span class="stops-label" style="color:var(--red)">No stops found</span>';
    return;
  }
  bar.innerHTML=
    '<span class="stops-label">Stops</span>'+
    list.map((s,i)=>
      `<button class="stop-chip ${i===0?'active':''}" data-idx="${i}"
        onclick="selectStopByIdx(${i},this)" title="${h(s.name)}">${h(s.name)}</button>`
    ).join('');
}
function selectStopByIdx(i,el){
  document.querySelectorAll('.stop-chip').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  selectStop(stops[i]);
}
function selectStop(stop){
  currentStop=stop;
  clearTimeout(refreshTimer);
  showState('loading');
  loadDepartures();
}
async function loadDepartures(){
  if(!currentStop)return;
  clearTimeout(refreshTimer);
  const dot=document.getElementById('liveDot');
  dot.classList.add('on');
  try{
    const deps=await fetchDepsVBB(currentStop.id);
    renderBoard(deps);
    const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
    document.getElementById('ftrRefresh').textContent='Updated '+t;
  }catch(e){
    showState('Failed to load departures:\n'+e.message);
  }
  dot.classList.remove('on');
  refreshTimer=setTimeout(loadDepartures,REFRESH_MS);
}
async function fetchDepsVBB(id){
  const r=await fetch(
    `https://v6.vbb.transport.rest/stops/${encodeURIComponent(id)}/departures?duration=60&results=20`
  );
  const data=await r.json();
  const arr=data.departures||(Array.isArray(data)?data:[]);
  return arr.map(d=>({
    line:d.line?.name,product:d.line?.product,
    dest:d.direction||d.destination?.name,
    planned:d.plannedWhen,actual:d.when,
  }));
}
function renderBoard(deps){
  const board=document.getElementById('board');
  if(!deps.length){
    board.innerHTML='<div class="state-box">No departures in the next 60 minutes</div>';
    return;
  }
  const now=Date.now();
  board.innerHTML=deps.slice(0,25).map(d=>`
    <div class="dep-row">
      ${badge(d.line,d.product)}
      <span class="dep-dest" title="${h(d.dest||'?')}">${h(d.dest||'?')}</span>
      <div class="dep-time-col">
        <span class="dep-time">${fmtTime(d.planned)}</span>
        ${delaySpan(d.planned,d.actual)}
      </div>
      ${etaSpan(d.actual||d.planned,now)}
    </div>`).join('');
}
const LINE_COLORS={
  U1:'#55a822',U2:'#dd6e14',U3:'#16683d',U4:'#f0d722',
  U5:'#7d4427',U6:'#8b5ca3',U7:'#528dba',U8:'#224f9e',U9:'#f7931e',
  S1:'#da6ba2',S2:'#007734',S3:'#0a5f98',S5:'#ef7c00',
  S7:'#775e38',S8:'#55a822',S9:'#990000',S25:'#007734',
  S41:'#ab2626',S42:'#cb6418',S45:'#c97a2f',
};
const DARK_FG=new Set(['U4','S5','S7','S8','S25']);
const PRODUCT_BG={
  subway:'#224f9e',suburban:'#007734',tram:'#cc2222',
  bus:'#6e3fa3',regional:'#ef7c00',ferry:'#0a5f98',
  s:'#007734',r:'#ef7c00',ic:'#cc2222',t:'#cc2222',b:'#6e3fa3',
};
function badge(name,product){
  const n=(name||'?').trim().toUpperCase();
  const bg=LINE_COLORS[n]||PRODUCT_BG[product]||'#444';
  const fg=DARK_FG.has(n)?'#000':'#fff';
  return `<span class="line-badge" style="background:${bg};color:${fg}">${h(n)}</span>`;
}
function fmtTime(iso){
  if(!iso)return '—';
  if(/^\d{1,2}:\d{2}(:\d{2})?$/.test(iso))return iso.slice(0,5);
  try{return new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false});}
  catch{return iso.slice(11,16)||'—';}
}
function delaySpan(planned,actual){
  if(!planned||!actual)return '';
  const m=Math.round((new Date(actual)-new Date(planned))/60000);
  if(m>1)return `<span class="dep-delay late">+${m}'</span>`;
  if(m<=0)return `<span class="dep-delay ok">✓</span>`;
  return '';
}
function etaSpan(iso,now){
  if(!iso)return '<span></span>';
  try{
    const m=Math.round((new Date(iso)-now)/60000);
    if(m<=0)return `<span class="dep-eta eta-now">NOW</span>`;
    if(m<=5)return `<span class="dep-eta eta-soon">${m}'</span>`;
    return `<span class="dep-eta eta-far">${m}'</span>`;
  }catch{return '<span></span>';}
}
function showState(msg){
  const board=document.getElementById('board');
  if(msg==='loading'){
    board.innerHTML='<div class="state-box"><div class="spinner"></div><span>Loading…</span></div>';
  }else{
    board.innerHTML=`<div class="state-box">${h(msg)}</div>`;
  }
}
function h(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
<script src="paywall.js" data-app="transit-board" data-minutes="10"></script>
</body>
</html>
