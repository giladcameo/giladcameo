<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Berlin Transit Live</title>
  <link rel="preconnect" href="https://unpkg.com"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root{
      --bg:rgba(13,17,23,.93);--surface:rgba(22,27,34,.95);--surface2:rgba(33,38,45,.95);
      --border:rgba(48,54,61,.8);--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;
      --green:#3fb950;--yellow:#d29922;--red:#f85149;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;width:100%;overflow:hidden;
      font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;color:var(--text)}

    /* MAP fills entire viewport */
    #map{position:fixed;inset:0;z-index:0;background:#0d1117}

    /* HEADER — floating bar at top */
    header{
      position:fixed;top:0;left:0;right:0;height:46px;z-index:500;
      background:var(--bg);backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:10px;padding:0 14px;
    }
    .logo-mark{background:#f5a800;color:#000;font-weight:900;font-size:13px;
      width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;flex-shrink:0}
    .logo-text{font-size:14px;font-weight:700}
    .spacer{flex:1}
    .clock{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent)}
    .pulse-wrap{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
    .pulse{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

    /* FILTER BAR — floating top-right */
    .filter-bar{
      position:fixed;top:56px;right:10px;z-index:400;
      display:flex;gap:5px;flex-wrap:wrap;max-width:320px;justify-content:flex-end;
    }
    .fc{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;
      border:1px solid var(--border);cursor:pointer;font-size:11px;font-weight:700;
      background:var(--surface);color:var(--muted);transition:all .15s;user-select:none;
      backdrop-filter:blur(8px)}
    .fc.on{color:#000 !important;border-color:transparent}
    .fc.off{opacity:.45}

    /* SIDE PANEL — floating left */
    .panel{
      position:fixed;top:56px;left:10px;bottom:10px;width:320px;z-index:400;
      background:var(--surface);backdrop-filter:blur(14px);
      border:1px solid var(--border);border-radius:12px;
      display:flex;flex-direction:column;overflow:hidden;
    }

    /* Search inside panel */
    .search-wrap{position:relative;padding:8px 10px;border-bottom:1px solid var(--border)}
    .search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);
      color:var(--text);padding:6px 10px 6px 30px;border-radius:7px;font-size:12px;outline:none}
    .search-wrap input:focus{border-color:var(--accent)}
    .s-icon{position:absolute;left:19px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
    .search-results{position:absolute;top:calc(100% - 8px);left:10px;right:10px;
      background:var(--surface2);border:1px solid var(--border);border-radius:8px;
      z-index:9999;max-height:200px;overflow-y:auto;display:none}
    .search-results.open{display:block}
    .sr-item{padding:8px 11px;cursor:pointer;border-bottom:1px solid var(--border)}
    .sr-item:last-child{border-bottom:none}
    .sr-item:hover{background:var(--surface)}
    .sr-name{font-weight:600;font-size:12px}
    .sr-sub{font-size:10px;color:var(--muted)}

    /* Favs */
    .favs{padding:6px 10px;border-bottom:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap}
    .fav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);
      padding:2px 9px;border-radius:20px;cursor:pointer;font-size:10px;white-space:nowrap}
    .fav-btn:hover,.fav-btn.active{border-color:var(--accent);color:var(--accent);
      background:rgba(88,166,255,.12)}

    /* Station header */
    .stn-hdr{padding:8px 12px;border-bottom:1px solid var(--border)}
    .stn-name{font-size:14px;font-weight:800;color:var(--accent);white-space:nowrap;
      overflow:hidden;text-overflow:ellipsis}
    .stn-meta{font-size:10px;color:var(--muted);margin-top:1px}
    .tabs{display:flex;gap:3px;margin-top:6px}
    .tab-btn{padding:3px 10px;border-radius:5px;border:1px solid transparent;
      background:transparent;color:var(--muted);cursor:pointer;font-size:11px}
    .tab-btn.active{background:var(--surface2);border-color:var(--border);color:var(--text)}

    /* Board */
    .board{flex:1;overflow-y:auto;padding:6px 8px}
    .board::-webkit-scrollbar{width:4px}
    .board::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

    /* Compact departure rows */
    .dep-row{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:6px;
      cursor:default;transition:background .12s}
    .dep-row:hover{background:var(--surface2)}
    .line-badge{display:inline-flex;align-items:center;justify-content:center;
      min-width:34px;padding:2px 5px;border-radius:4px;font-weight:800;font-size:11px;
      flex-shrink:0}
    .dep-dest{flex:1;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .dep-time{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;flex-shrink:0;text-align:right}
    .dep-delay{font-size:9px;margin-left:2px}
    .dep-delay.late{color:var(--red)}.dep-delay.ok{color:var(--green)}
    .countdown{display:inline-block;padding:1px 6px;border-radius:20px;font-size:10px;font-weight:700;flex-shrink:0}
    .cnt-now{background:var(--red);color:#fff}
    .cnt-soon{background:var(--yellow);color:#000}
    .cnt-later{background:rgba(139,148,158,.15);color:var(--muted)}

    /* States */
    .state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:8px;padding:30px 16px;text-align:center;color:var(--muted);font-size:12px}
    .spinner{width:24px;height:24px;border:2px solid var(--border);
      border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Vehicle labels on map */
    .veh-icon{pointer-events:auto}
    .veh-icon span{display:inline-block;padding:1px 5px;border-radius:3px;
      font-size:9px;font-weight:800;white-space:nowrap;cursor:pointer;
      box-shadow:0 1px 4px rgba(0,0,0,.6)}

    /* Leaflet override for dark */
    .leaflet-container{background:#1a1f2e}
    .leaflet-control-zoom a{background:var(--surface) !important;color:var(--text) !important;
      border-color:var(--border) !important}
  </style>
</head>
<body>

<!-- Full-screen map -->
<div id="map"></div>

<!-- Header -->
<header>
  <div class="logo-mark">BVG</div>
  <div class="logo-text">Berlin Transit Live</div>
  <div class="spacer"></div>
  <div class="clock" id="clock">--:--:--</div>
  <div class="pulse-wrap"><div class="pulse"></div><span>10s</span></div>
</header>

<!-- Filter chips (top-right) -->
<div class="filter-bar" id="filterBar"></div>

<!-- Side panel -->
<div class="panel">

  <div class="search-wrap">
    <svg class="s-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="searchInput" type="text" placeholder="Station suchen…" autocomplete="off"/>
    <div class="search-results" id="searchResults"></div>
  </div>

  <div class="favs" id="favs"></div>

  <div class="stn-hdr">
    <div class="stn-name" id="stationName">Berlin Hauptbahnhof</div>
    <div class="stn-meta" id="stationMeta"></div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('departures')">Abfahrt</button>
      <button class="tab-btn" onclick="switchTab('arrivals')">Ankunft</button>
    </div>
  </div>

  <div class="board" id="board">
    <div class="state-box"><div class="spinner"></div>Lade Echtzeit…</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API = 'https://v6.vbb.transport.rest';
const REFRESH_MS = 10000;
// Extended bbox to cover all VBB S-Bahn routes outside Berlin:
// west → Potsdam Hbf (S7), east → Strausberg Nord (S5), north → Oranienburg (S1/S25), south → Blankenfelde (S2/S25)
const BBOX = {north:52.82,west:12.88,south:52.18,east:14.00};

const FAVS_LIST = [
  {name:'Hbf',        id:'900003201'},
  {name:'Alex',       id:'900100003'},
  {name:'Zoo',        id:'900023201'},
  {name:'Ostbhf',     id:'900120005'},
  {name:'Südkreuz',   id:'900140004'},
  {name:'Gesundbrunnen', id:'900007102'},
];

const FILTER_DEFS = [
  {key:'subway',   label:'U-Bahn', bg:'#224f9e', fg:'#fff'},
  {key:'suburban', label:'S-Bahn', bg:'#007734', fg:'#fff'},
  {key:'bus',      label:'Bus',    bg:'#6e3fa3', fg:'#fff'},
  {key:'tram',     label:'Tram',   bg:'#cc2222', fg:'#fff'},
  {key:'regional', label:'Regio',  bg:'#ef7c00', fg:'#fff'},
  {key:'ferry',    label:'Fähre',  bg:'#0a5f98', fg:'#fff'},
];

const LINE_COLORS = {
  U1:'#55a822',U2:'#dd6e14',U3:'#16683d',U4:'#f0d722',
  U5:'#7d4427',U6:'#8b5ca3',U7:'#528dba',U8:'#224f9e',U9:'#f7931e',
  S1:'#da6ba2',S2:'#007734',S3:'#0a5f98',S5:'#ef7c00',
  S7:'#775e38',S8:'#55a822',S9:'#990000',S25:'#007734',
  S41:'#ab2626',S42:'#cb6418',S45:'#c97a2f',S46:'#c97a2f',S47:'#c97a2f',
};
const DARK_FG = new Set(['U4','S5','S7','S8','S25']);

// State
let stationId = '900003201', stationName = 'Berlin Hauptbahnhof';
let tab = 'departures';
let filters = Object.fromEntries(FILTER_DEFS.map(f=>[f.key,true]));
let depAbort=null, radarAbort=null, refreshTimer=null, searchTimer=null;
let map, stationMarker=null, vehicleMarkers={};

/* ── CLOCK ── */
setInterval(()=>{
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
},1000);

/* ── MAP ── */
function initMap(){
  map = L.map('map',{zoomControl:true}).setView([52.52,13.405],12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; OSM &copy; CARTO',subdomains:'abcd',maxZoom:19
  }).addTo(map);
}

function setStationMarker(lat,lon,name){
  if(stationMarker) stationMarker.remove();
  stationMarker = L.circleMarker([lat,lon],{
    radius:9,color:'#58a6ff',fillColor:'#58a6ff',fillOpacity:.4,weight:2,zIndexOffset:1000
  }).addTo(map).bindTooltip(`<b>${name}</b>`,{direction:'right'});
  map.setView([lat,lon],Math.max(map.getZoom(),13),{animate:true,duration:.5});
}

function productBg(p){
  return {subway:'#224f9e',suburban:'#007734',bus:'#6e3fa3',
          tram:'#cc2222',regional:'#ef7c00',ferry:'#0a5f98'}[p]||'#444';
}

function updateVehicles(movements){
  const seen=new Set();
  (movements||[]).forEach(m=>{
    if(!m.line||!m.location) return;
    const prod=m.line.product;
    if(!filters[prod]) return;
    const id=m.tripId||(m.line.name+m.direction);
    const {latitude:lat,longitude:lon}=m.location;
    const n=m.line.name||'?';
    const bg=LINE_COLORS[n]||productBg(prod);
    const fg=DARK_FG.has(n)?'#000':'#fff';
    seen.add(id);
    if(vehicleMarkers[id]){
      vehicleMarkers[id].setLatLng([lat,lon]);
    } else {
      const icon=L.divIcon({
        className:'veh-icon',
        html:`<span style="background:${bg};color:${fg}">${n}</span>`,
        iconAnchor:[15,8]
      });
      vehicleMarkers[id]=L.marker([lat,lon],{icon,zIndexOffset:0})
        .addTo(map)
        .bindTooltip(`${n}${m.direction?' → '+m.direction:''}`,{sticky:true});
    }
  });
  Object.keys(vehicleMarkers).forEach(id=>{
    if(!seen.has(id)){vehicleMarkers[id].remove();delete vehicleMarkers[id];}
  });
}

/* ── FILTERS ── */
function renderFilters(){
  document.getElementById('filterBar').innerHTML = FILTER_DEFS.map(f=>{
    const on=filters[f.key];
    return `<div class="fc ${on?'on':'off'}"
      style="${on?`background:${f.bg};color:${f.fg}`:''}"
      onclick="toggleFilter('${f.key}')">${f.label}</div>`;
  }).join('');
}
function toggleFilter(key){
  filters[key]=!filters[key];
  renderFilters();
  // hide/show existing markers immediately
  Object.entries(vehicleMarkers).forEach(([id,mk])=>{
    const el=mk.getElement();
    if(el) el.style.display='block'; // will be corrected on next radar update
  });
  loadAll();
}

/* ── FAVS ── */
function renderFavs(){
  document.getElementById('favs').innerHTML=FAVS_LIST.map(s=>
    `<button class="fav-btn ${s.id===stationId?'active':''}"
       onclick="loadStation('${s.id}','${s.name}')">${s.name}</button>`
  ).join('');
}

/* ── SEARCH ── */
const searchInput=document.getElementById('searchInput');
const searchResults=document.getElementById('searchResults');
searchInput.addEventListener('input',()=>{
  clearTimeout(searchTimer);
  const q=searchInput.value.trim();
  if(q.length<2){searchResults.classList.remove('open');return;}
  searchTimer=setTimeout(()=>doSearch(q),300);
});
document.addEventListener('click',e=>{
  if(!e.target.closest('.search-wrap')) searchResults.classList.remove('open');
});
async function doSearch(q){
  try{
    const r=await fetch(`${API}/locations?query=${encodeURIComponent(q)}&results=7&stops=true&addresses=false&poi=false`);
    const data=await r.json();
    const stops=data.filter(d=>d.type==='stop');
    searchResults.innerHTML=stops.length
      ? stops.map(s=>`<div class="sr-item" onclick="loadStation('${s.id}','${s.name}');searchInput.value='';searchResults.classList.remove('open')">
          <div class="sr-name">${s.name}</div>
          <div class="sr-sub">${Object.keys(s.products||{}).filter(k=>s.products[k]).join(' · ')}</div>
        </div>`).join('')
      : '<div class="sr-item"><span style="color:var(--muted)">Keine Ergebnisse</span></div>';
    searchResults.classList.add('open');
  }catch{}
}

/* ── HELPERS ── */
function lineBadge(line){
  if(!line) return '<span class="line-badge" style="background:#333;color:#fff">?</span>';
  const n=line.name||'?';
  const bg=LINE_COLORS[n]||productBg(line.product)||'#444';
  const fg=DARK_FG.has(n)?'#000':'#fff';
  return `<span class="line-badge" style="background:${bg};color:${fg}">${n}</span>`;
}
function fmtTime(iso){
  if(!iso) return '—';
  return new Date(iso).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
}
function minsUntil(iso){
  if(!iso) return null;
  return Math.round((new Date(iso)-Date.now())/60000);
}
function cdChip(m){
  if(m===null) return '';
  if(m<=0)  return `<span class="countdown cnt-now">Jetzt</span>`;
  if(m<=5)  return `<span class="countdown cnt-soon">${m}'</span>`;
  return `<span class="countdown cnt-later">${m}'</span>`;
}
function delaySpan(pl,ac){
  if(!pl||!ac) return '';
  const d=Math.round((new Date(ac)-new Date(pl))/60000);
  if(d>1)  return `<span class="dep-delay late">+${d}'</span>`;
  if(d<=0) return `<span class="dep-delay ok">✓</span>`;
  return '';
}

/* ── FETCH DEPS ── */
async function fetchDeps(id,type){
  if(depAbort) depAbort.abort();
  depAbort=new AbortController();
  const qs=FILTER_DEFS.map(f=>f.key+'='+(filters[f.key]?'true':'false')).join('&');
  const ep=type==='departures'?'departures':'arrivals';
  const res=await fetch(`${API}/stops/${id}/${ep}?duration=60&results=25&${qs}`,
    {signal:depAbort.signal});
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const data=await res.json();
  return data[ep]||data;
}

function renderBoard(deps,type){
  if(!deps.length)
    return '<div class="state-box">Keine Abfahrten</div>';
  return deps.slice(0,20).map(d=>{
    const when=d.when||d.plannedWhen;
    const dest=type==='departures'?(d.direction||'—'):(d.origin?.name||'—');
    const mins=minsUntil(when);
    return `<div class="dep-row">
      ${lineBadge(d.line)}
      <span class="dep-dest" title="${dest}">${dest}</span>
      <span class="dep-time">${fmtTime(d.plannedWhen)}${delaySpan(d.plannedWhen,d.when)}</span>
      ${cdChip(mins)}
    </div>`;
  }).join('');
}

/* ── FETCH RADAR ── */
async function fetchRadar(){
  if(radarAbort) radarAbort.abort();
  radarAbort=new AbortController();
  const {north,west,south,east}=BBOX;
  // Pass active filters to the API so buses don't fill the results quota
  // before outer S-Bahn trains (S3/S5/S7) are included
  const qs=FILTER_DEFS.map(f=>f.key+'='+(filters[f.key]?'true':'false')).join('&');
  const res=await fetch(
    `${API}/radar?north=${north}&west=${west}&south=${south}&east=${east}&results=512&duration=30&frames=1&polylines=false&${qs}`,
    {signal:radarAbort.signal});
  if(!res.ok) return;
  const data=await res.json();
  updateVehicles(data.movements);
}

/* ── LOAD ALL ── */
async function loadAll(){
  clearTimeout(refreshTimer);
  const [depsR]=await Promise.allSettled([fetchDeps(stationId,tab),fetchRadar()]);
  const board=document.getElementById('board');
  if(depsR.status==='fulfilled'){
    board.innerHTML=renderBoard(depsR.value,tab);
  } else if(depsR.reason?.name!=='AbortError'){
    const cors=location.protocol==='file:';
    board.innerHTML=cors
      ? `<div class="state-box" style="color:var(--red)">CORS-Fehler.<br><small>Starte: <code>python3 -m http.server 8080</code></small></div>`
      : `<div class="state-box" style="color:var(--red)">${depsR.reason?.message}</div>`;
  }
  refreshTimer=setTimeout(loadAll,REFRESH_MS);
}

/* ── LOAD STATION ── */
async function loadStation(id,name){
  stationId=id; stationName=name;
  document.getElementById('stationName').textContent=name;
  document.getElementById('stationMeta').textContent=`Stop: ${id}`;
  document.getElementById('board').innerHTML='<div class="state-box"><div class="spinner"></div>Lade…</div>';
  renderFavs();
  try{
    const r=await fetch(`${API}/stops/${id}`);
    const s=await r.json();
    if(s.location) setStationMarker(s.location.latitude,s.location.longitude,name);
  }catch{}
  loadAll();
}

/* ── TAB ── */
function switchTab(t){
  tab=t;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>
    b.classList.toggle('active',(i===0&&t==='departures')||(i===1&&t==='arrivals')));
  loadAll();
}

/* ── INIT ── */
initMap();
renderFavs();
renderFilters();
loadStation(stationId,stationName);
</script>
</body>
</html>
