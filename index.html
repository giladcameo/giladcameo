<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Berlin Transit Board</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#001640"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Berlin Transit"/>
  <style>
:root {
  --bg:       #001030;
  --panel:    #001d50;
  --hdr:      #001640;
  --next:     #0057b5;
  --sep:      rgba(255,255,255,0.1);
  --text:     #ffffff;
  --sub:      rgba(255,255,255,0.5);
  --green:    #5cff7a;
  --red:      #ff5252;
  --yellow:   #ffcc44;
  --font:     'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

/* ══ LAYOUT ══ */
#main { display: flex; flex-direction: column; height: 100%; background: var(--panel); }

/* ══ HEADER ══ */
.b-header {
  flex-shrink: 0; position: relative;
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px;
  background: var(--hdr);
  border-bottom: 1px solid var(--sep);
}

/* Search input */
.search-wrap { flex: 1; position: relative; display: flex; align-items: center; }
.search-wrap input {
  width: 100%;
  padding: 9px 32px 9px 36px;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 6px;
  color: #fff; font-family: var(--font); font-size: 14px;
  outline: none; transition: border-color .15s, background .15s;
}
.search-wrap input::placeholder { color: rgba(255,255,255,.3); }
.search-wrap input:focus { border-color: rgba(255,255,255,.35); background: rgba(255,255,255,.15); }
.s-icon {
  position: absolute; left: 10px; pointer-events: none;
  color: rgba(255,255,255,.35); width: 16px; height: 16px;
}
.s-clear {
  position: absolute; right: 8px;
  background: none; border: none; color: rgba(255,255,255,.4);
  font-size: 15px; line-height: 1; cursor: pointer; padding: 2px 4px;
  opacity: 0; pointer-events: none; transition: opacity .15s;
}
.s-clear.on { opacity: 1; pointer-events: auto; }

/* Dropdown */
.dropdown {
  position: absolute; top: calc(100% - 1px); left: 16px; right: 16px;
  z-index: 300;
  background: #001a44;
  border: 1px solid rgba(255,255,255,.18); border-top: none;
  border-radius: 0 0 8px 8px;
  max-height: 320px; overflow-y: auto;
  display: none;
  box-shadow: 0 12px 28px rgba(0,0,0,.6);
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.1) transparent;
}
.dropdown.open { display: block; }
.d-row {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,.07);
  transition: background .1s;
}
.d-row:last-child { border-bottom: none; }
.d-row:hover { background: rgba(255,255,255,.09); }
.d-name { flex: 1; font-size: 14px; }
.d-tag {
  font-size: 10px; color: rgba(255,255,255,.4);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 3px; padding: 1px 6px; white-space: nowrap;
}
.d-msg { padding: 14px; font-size: 12px; color: var(--sub); text-align: center; }

/* Clock */
.bh-clock {
  font-size: 26px; font-weight: 300;
  font-variant-numeric: tabular-nums; letter-spacing: -.5px;
  flex-shrink: 0; color: var(--text);
}

/* ══ COL LABELS ══ */
.col-labels {
  flex-shrink: 0;
  display: grid; grid-template-columns: 52px 1fr 88px;
  padding: 4px 20px;
  background: #001234; border-bottom: 1px solid var(--sep);
  font-size: 9px; letter-spacing: .2em;
  text-transform: uppercase; color: var(--sub);
}
.col-labels span:last-child { text-align: right; }

/* ══ BOARD ══ */
.b-scroll {
  flex: 1; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.12) transparent;
}
.b-scroll::-webkit-scrollbar { width: 3px; }
.b-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); }

/* Next row */
.dep-next {
  display: flex; align-items: center; gap: 16px;
  padding: 18px 20px;
  background: var(--next);
  border-bottom: 2px solid rgba(255,255,255,.18);
  animation: fadeIn .2s ease;
}
.dep-next .badge   { width: 54px; height: 54px; font-size: 15px; border-radius: 6px; flex-shrink: 0; }
.dep-next .d-info  { flex: 1; min-width: 0; }
.dep-next .d-dest  { font-size: 20px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dep-next .d-time  { font-size: 12px; color: rgba(255,255,255,.65); margin-top: 4px; }
.dep-next .d-eta   { flex-shrink: 0; text-align: right; }
.dep-next .eta-num { font-size: 32px; font-weight: 700; line-height: 1; }
.dep-next .eta-lbl { font-size: 11px; color: rgba(255,255,255,.6); margin-top: 2px; }

/* Regular rows */
.dep-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 20px; border-bottom: 1px solid var(--sep);
  transition: background .1s; animation: fadeIn .2s ease;
}
.dep-row:hover  { background: rgba(255,255,255,.05); }
.dep-row .badge { width: 44px; height: 44px; font-size: 13px; border-radius: 5px; flex-shrink: 0; }
.dep-row .d-info { flex: 1; min-width: 0; }
.dep-row .d-dest { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dep-row .d-time { font-size: 11px; color: var(--sub); margin-top: 2px; }
.dep-row .d-eta  { flex-shrink: 0; text-align: right; min-width: 60px; }
.dep-row .eta-num { font-size: 17px; font-weight: 700; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }

.badge { display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff; }

.d-delay      { font-size: 10px; }
.d-delay.late { color: var(--red); }
.d-delay.ok   { color: var(--green); }

.eta-now  { color: var(--red); animation: blink 1s infinite; }
.eta-soon { color: var(--yellow); }
@keyframes blink { 50% { opacity: .2; } }

/* State */
.state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; padding: 60px 24px;
  font-size: 13px; color: var(--sub); text-align: center; line-height: 1.9;
}
.spinner {
  width: 22px; height: 22px;
  border: 2px solid rgba(255,255,255,.2); border-top-color: #fff;
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Footer */
footer {
  flex-shrink: 0; height: 26px;
  display: flex; align-items: center; gap: 8px;
  padding: 0 20px;
  background: #001234; border-top: 1px solid var(--sep);
  font-size: 10px; color: var(--sub);
}
footer span:first-child { flex: 1; }
  </style>
</head>
<body>

<div id="main">

  <!-- HEADER -->
  <div class="b-header">
    <div class="search-wrap">
      <svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="searchInput" type="text" placeholder="Search station…" autocomplete="off" spellcheck="false"/>
      <button class="s-clear" id="clearBtn" title="Clear">✕</button>
    </div>
    <div class="bh-clock" id="clock">--:--</div>
    <!-- Dropdown anchors to header -->
    <div class="dropdown" id="dropdown"></div>
  </div>

  <!-- COLUMN LABELS -->
  <div class="col-labels">
    <span>Line</span><span>Destination</span><span>ETA</span>
  </div>

  <!-- BOARD -->
  <div class="b-scroll">
    <div id="board">
      <div class="state">🔍<br>Search for a Berlin station<br>to see live departures</div>
    </div>
  </div>

  <footer>
    <span id="ftrApi">—</span>
    <span id="ftrTime">—</span>
  </footer>

</div>

<script>
'use strict';

const REFRESH_MS = 30_000;
let currentStop = null, refreshTimer = null, searchTimer = null;

/* ── Clock ── */
const clockEl = document.getElementById('clock');
function tick() {
  clockEl.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
}
setInterval(tick, 1000); tick();

/* ── Search input wiring ── */
const searchInput = document.getElementById('searchInput');
const clearBtn    = document.getElementById('clearBtn');
const dropdown    = document.getElementById('dropdown');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  clearBtn.classList.toggle('on', q.length > 0);
  clearTimeout(searchTimer);
  if (q.length < 2) { closeDropdown(); return; }
  searchTimer = setTimeout(() => doSearch(q), 300);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { clearSearch(); }
});

clearBtn.addEventListener('click', clearSearch);

document.addEventListener('click', e => {
  if (!e.target.closest('.b-header')) closeDropdown();
});

function clearSearch() {
  searchInput.value = '';
  clearBtn.classList.remove('on');
  closeDropdown();
  clearTimeout(refreshTimer);
  currentStop = null;
  document.getElementById('ftrApi').textContent = '—';
  document.getElementById('ftrTime').textContent = '—';
  document.getElementById('board').innerHTML =
    '<div class="state">🔍<br>Search for a station above<br>to see live departures</div>';
}

function closeDropdown() {
  dropdown.classList.remove('open');
  dropdown.innerHTML = '';
}

/* ── Search: VBB (Berlin & Brandenburg) ── */
async function doSearch(query) {
  dropdown.innerHTML = '<div class="d-msg">Searching…</div>';
  dropdown.classList.add('open');
  try {
    const r = await fetch(
      `https://v6.vbb.transport.rest/locations?query=${encodeURIComponent(query)}&results=10&stops=true&addresses=false&poi=false`
    );
    const data = await r.json();
    const results = (Array.isArray(data) ? data : [])
      .filter(s => s.type === 'stop')
      .map(s => ({ id: s.id, name: s.name }));
    renderDropdown(results);
  } catch (e) {
    dropdown.innerHTML = `<div class="d-msg">Error: ${h(e.message)}</div>`;
  }
}

/* ── Render dropdown ── */
function renderDropdown(results) {
  if (!results.length) {
    dropdown.innerHTML = '<div class="d-msg">No stations found</div>';
    return;
  }
  dropdown.innerHTML = results.map((r, i) =>
    `<div class="d-row" data-idx="${i}">
      <span class="d-name">${h(r.name)}</span>
    </div>`
  ).join('');

  dropdown.querySelectorAll('.d-row').forEach(el => {
    el.addEventListener('click', () => {
      const s = results[+el.dataset.idx];
      selectStation(s);
    });
  });
}

/* ── Select a station ── */
function selectStation(stop) {
  currentStop = stop;
  searchInput.value = stop.name;
  clearBtn.classList.add('on');
  closeDropdown();
  clearTimeout(refreshTimer);

  document.getElementById('ftrApi').textContent = 'VBB · Berlin & Brandenburg';

  showState('loading');
  loadDepartures();
}

/* ── Load departures ── */
async function loadDepartures() {
  if (!currentStop) return;
  clearTimeout(refreshTimer);

  try {
    const deps = await fetchDepsVBB(currentStop.id);
    renderBoard(deps);
    document.getElementById('ftrTime').textContent =
      'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  } catch (e) {
    showState('Error loading departures:\n' + e.message);
  }

  refreshTimer = setTimeout(loadDepartures, REFRESH_MS);
}

/* ── Fetch: VBB (Berlin & Brandenburg) ── */
async function fetchDepsVBB(id) {
  const r = await fetch(
    `https://v6.vbb.transport.rest/stops/${encodeURIComponent(id)}/departures?duration=60&results=20`
  );
  const data = await r.json();
  return (data.departures || (Array.isArray(data) ? data : [])).map(d => ({
    line:    d.line?.name,
    product: d.line?.product,
    dest:    d.direction || d.destination?.name,
    planned: d.plannedWhen,
    actual:  d.when,
  }));
}

/* ── Render board ── */
function renderBoard(deps) {
  const board = document.getElementById('board');
  if (!deps.length) {
    board.innerHTML = '<div class="state">No departures in the next hour</div>';
    return;
  }
  const now = Date.now();
  const [first, ...rest] = deps.slice(0, 20);
  board.innerHTML = buildNextRow(first, now) + rest.map(d => buildRow(d, now)).join('');
}

function buildNextRow(d, now) {
  const eta = etaMins(d.actual || d.planned, now);
  return `
  <div class="dep-next">
    <div class="badge" style="background:${bg(d)};color:${fg(d)}">${h(d.line || '?')}</div>
    <div class="d-info">
      <div class="d-dest">${h(d.dest || '?')}</div>
      <div class="d-time">${fmtTime(d.planned)}${delayText(d)}</div>
    </div>
    <div class="d-eta">${etaBig(eta)}</div>
  </div>`;
}

function buildRow(d, now) {
  const eta = etaMins(d.actual || d.planned, now);
  return `
  <div class="dep-row">
    <div class="badge" style="background:${bg(d)};color:${fg(d)}">${h(d.line || '?')}</div>
    <div class="d-info">
      <div class="d-dest">${h(d.dest || '?')}</div>
      <div class="d-time">${fmtTime(d.planned)}${delayText(d)}</div>
    </div>
    <div class="d-eta">${etaSmall(eta)}</div>
  </div>`;
}

function etaBig(m) {
  if (m === null) return '';
  if (m <= 0) return `<div class="eta-num eta-now">NOW</div>`;
  return `<div class="eta-num ${m <= 5 ? 'eta-soon' : ''}">${m}</div><div class="eta-lbl">min</div>`;
}
function etaSmall(m) {
  if (m === null) return '';
  if (m <= 0) return `<div class="eta-num eta-now" style="font-size:17px">NOW</div>`;
  return `<div class="eta-num ${m <= 5 ? 'eta-soon' : ''}" style="font-size:17px">${m}<span style="font-size:11px;font-weight:400;opacity:.6"> min</span></div>`;
}

function delayText(d) {
  if (!d.planned || !d.actual) return '';
  const m = Math.round((new Date(d.actual) - new Date(d.planned)) / 60000);
  if (m > 1)  return ` <span class="d-delay late">+${m}'</span>`;
  if (m <= 0) return ` <span class="d-delay ok">✓</span>`;
  return '';
}

/* ── Line badge colours ── */
const LINE_COLORS = {
  U1:'#55a822',U2:'#dd6e14',U3:'#16683d',U4:'#f0d722',
  U5:'#7d4427',U6:'#8b5ca3',U7:'#528dba',U8:'#224f9e',U9:'#f7931e',
  S1:'#da6ba2',S2:'#007734',S3:'#0a5f98',S5:'#ef7c00',
  S7:'#775e38',S8:'#55a822',S9:'#990000',S25:'#007734',
  S41:'#ab2626',S42:'#cb6418',S45:'#c97a2f',S47:'#007734',
};
const DARK_FG    = new Set(['U4','S5','S7','S8','S25']);
const PRODUCT_BG = {
  subway:'#224f9e', suburban:'#007734', tram:'#cc2222',
  bus:'#6e3fa3', regional:'#ef7c00', ferry:'#0a5f98',
  s:'#007734', r:'#ef7c00', ic:'#cc2222', t:'#cc2222',
};
function bg(d) {
  const n = (d.line || '').toUpperCase();
  return LINE_COLORS[n] || PRODUCT_BG[d.product] || '#334466';
}
function fg(d) { return DARK_FG.has((d.line || '').toUpperCase()) ? '#000' : '#fff'; }

/* ── Helpers ── */
function etaMins(iso, now) {
  if (!iso) return null;
  if (/^\d{1,2}:\d{2}(:\d{2})?$/.test(iso)) return null;
  try { return Math.round((new Date(iso) - now) / 60000); } catch { return null; }
}
function fmtTime(iso) {
  if (!iso) return '—';
  if (/^\d{1,2}:\d{2}(:\d{2})?$/.test(iso)) return iso.slice(0, 5);
  try { return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false }); }
  catch { return '—'; }
}
function showState(msg) {
  const board = document.getElementById('board');
  board.innerHTML = msg === 'loading'
    ? '<div class="state"><div class="spinner"></div>Loading departures…</div>'
    : `<div class="state">${h(msg)}</div>`;
}
function h(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Register Service Worker ── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
