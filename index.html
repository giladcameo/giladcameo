<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Berlin Transit Live</title>
  <link rel="preconnect" href="https://unpkg.com"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root{
      --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
      --text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;
      --green:#3fb950;--yellow:#d29922;--red:#f85149;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
      font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}

    /* ── Header ── */
    header{
      height:52px;background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:12px;padding:0 16px;flex-shrink:0;
    }
    .logo-mark{background:#f5a800;color:#000;font-weight:900;font-size:15px;
      width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;flex-shrink:0}
    .logo-text{font-size:15px;font-weight:700}
    .spacer{flex:1}
    .clock{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent)}
    .pulse-wrap{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
    .pulse{width:7px;height:7px;background:var(--green);border-radius:50%;
      animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

    /* ── Layout ── */
    .app{display:flex;height:calc(100vh - 52px)}

    /* ── Left Panel ── */
    .panel{width:400px;flex-shrink:0;display:flex;flex-direction:column;
      border-right:1px solid var(--border);overflow:hidden}

    /* Search */
    .search-row{padding:10px 12px;border-bottom:1px solid var(--border);
      display:flex;gap:8px;align-items:center}
    .search-wrap{position:relative;flex:1}
    .search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);
      color:var(--text);padding:7px 10px 7px 32px;border-radius:7px;font-size:13px;outline:none}
    .search-wrap input:focus{border-color:var(--accent)}
    .search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);
      color:var(--muted);pointer-events:none}
    .search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;
      background:var(--surface2);border:1px solid var(--border);border-radius:8px;
      z-index:9999;max-height:240px;overflow-y:auto;display:none}
    .search-results.open{display:block}
    .sr-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);
      display:flex;gap:8px;align-items:center}
    .sr-item:last-child{border-bottom:none}
    .sr-item:hover{background:var(--surface)}
    .sr-name{font-weight:600;font-size:13px}
    .sr-sub{font-size:11px;color:var(--muted)}

    /* Favs */
    .favs{padding:8px 12px;border-bottom:1px solid var(--border);
      display:flex;gap:6px;flex-wrap:wrap}
    .fav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);
      padding:3px 10px;border-radius:20px;cursor:pointer;font-size:11px;white-space:nowrap}
    .fav-btn:hover,.fav-btn.active{border-color:var(--accent);color:var(--accent);
      background:rgba(88,166,255,.1)}

    /* Filter chips */
    .filters{padding:8px 12px;border-bottom:1px solid var(--border);
      display:flex;gap:5px;flex-wrap:wrap}
    .filter-chip{display:flex;align-items:center;gap:4px;padding:3px 10px;
      border-radius:20px;border:1px solid var(--border);cursor:pointer;
      font-size:11px;font-weight:600;background:var(--surface2);color:var(--muted);
      transition:all .15s;user-select:none}
    .filter-chip.on{color:#000;border-color:transparent}
    .filter-chip.off{opacity:.4}

    /* Station header */
    .station-header{padding:10px 14px;border-bottom:1px solid var(--border)}
    .station-title{font-size:16px;font-weight:800;color:var(--accent)}
    .station-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .tabs{display:flex;gap:4px;margin-top:8px}
    .tab-btn{padding:4px 12px;border-radius:6px;border:1px solid transparent;
      background:transparent;color:var(--muted);cursor:pointer;font-size:12px}
    .tab-btn.active{background:var(--surface2);border-color:var(--border);color:var(--text)}

    /* Board */
    .board{flex:1;overflow-y:auto;padding:8px 12px}
    .dep-table{width:100%;border-collapse:separate;border-spacing:0 3px}
    .dep-table thead th{font-size:10px;font-weight:600;text-transform:uppercase;
      letter-spacing:.06em;color:var(--muted);padding:3px 6px;text-align:left}
    .dep-row{background:var(--surface)}
    .dep-row:hover{background:var(--surface2)}
    .dep-row td{padding:8px 6px;vertical-align:middle}
    .dep-row td:first-child{border-radius:6px 0 0 6px;padding-left:10px}
    .dep-row td:last-child{border-radius:0 6px 6px 0;padding-right:10px}
    .line-badge{display:inline-flex;align-items:center;justify-content:center;
      min-width:36px;padding:2px 6px;border-radius:4px;font-weight:800;font-size:12px}
    .dest{font-weight:600;font-size:12px;max-width:140px;white-space:nowrap;
      overflow:hidden;text-overflow:ellipsis}
    .time-cell{font-variant-numeric:tabular-nums;font-weight:700;font-size:14px;
      text-align:right;white-space:nowrap}
    .delay{font-size:10px;font-weight:500;margin-left:3px}
    .delay.late{color:var(--red)}.delay.ok{color:var(--green)}
    .countdown{display:inline-block;padding:1px 7px;border-radius:20px;
      font-size:11px;font-weight:700}
    .cnt-now{background:var(--red);color:#fff}
    .cnt-soon{background:var(--yellow);color:#000}
    .cnt-later{background:var(--surface2);color:var(--muted)}
    .plat{color:var(--muted);font-size:11px;text-align:center}

    /* State */
    .loading-state,.error-state,.empty-state{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:10px;padding:40px 20px;text-align:center}
    .loading-state{color:var(--muted)}
    .error-state{color:var(--red);font-size:13px}
    .error-state code{background:var(--surface2);padding:3px 8px;border-radius:4px;
      font-size:11px;display:block;margin-top:6px;color:var(--text)}
    .spinner{width:28px;height:28px;border:3px solid var(--border);
      border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Map ── */
    #map{flex:1;z-index:0}
    .leaflet-container{background:#0d1117}
    .veh-label{
      background:transparent;border:none;box-shadow:none;
      font-size:10px;font-weight:800;white-space:nowrap;
      text-shadow:0 0 3px #000,0 0 6px #000;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">BVG</div>
  <div class="logo-text">Berlin Transit Live</div>
  <div class="spacer"></div>
  <div class="clock" id="clock">--:--</div>
  <div class="pulse-wrap"><div class="pulse"></div><span id="refreshLabel">10s</span></div>
</header>

<div class="app">
  <!-- ── Left Panel ── -->
  <div class="panel">

    <!-- Search -->
    <div class="search-row">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="searchInput" type="text" placeholder="Station suchen…" autocomplete="off"/>
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>

    <!-- Favourites -->
    <div class="favs" id="favs"></div>

    <!-- Filters -->
    <div class="filters" id="filters"></div>

    <!-- Station header -->
    <div class="station-header">
      <div class="station-title" id="stationName">Berlin Hauptbahnhof</div>
      <div class="station-meta" id="stationMeta"></div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('departures')">Abfahrt</button>
        <button class="tab-btn" onclick="switchTab('arrivals')">Ankunft</button>
      </div>
    </div>

    <!-- Board -->
    <div class="board" id="board">
      <div class="loading-state"><div class="spinner"></div><span>Lade Echtzeitdaten…</span></div>
    </div>

  </div>

  <!-- ── Map ── -->
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ══════════════════════════════════════════
   CONFIG
══════════════════════════════════════════ */
const API = 'https://v6.vbb.transport.rest';
const REFRESH_MS = 10000;
const RADAR_BBOX = { north:52.68, west:13.09, south:52.35, east:13.76 };

const FAVS = [
  {name:'Hauptbahnhof', id:'900003201'},
  {name:'Alexanderplatz', id:'900100003'},
  {name:'Zoo', id:'900023201'},
  {name:'Ostbahnhof', id:'900120005'},
  {name:'Südkreuz', id:'900140004'},
  {name:'Gesundbrunnen', id:'900007102'},
];

const FILTER_DEFS = [
  {key:'subway',   label:'U-Bahn', color:'#224f9e', fg:'#fff'},
  {key:'suburban', label:'S-Bahn', color:'#007734', fg:'#fff'},
  {key:'bus',      label:'Bus',    color:'#8b5ca3', fg:'#fff'},
  {key:'tram',     label:'Tram',   color:'#cc2222', fg:'#fff'},
  {key:'regional', label:'Regio',  color:'#ef7c00', fg:'#fff'},
  {key:'ferry',    label:'Fähre',  color:'#0a5f98', fg:'#fff'},
];

const LINE_COLORS = {
  U1:'#55a822',U2:'#dd6e14',U3:'#16683d',U4:'#f0d722',
  U5:'#7d4427',U6:'#8b5ca3',U7:'#528dba',U8:'#224f9e',U9:'#f7931e',
  S1:'#da6ba2',S2:'#007734',S3:'#0a5f98',S5:'#ef7c00',
  S7:'#775e38',S8:'#55a822',S9:'#990000',S25:'#007734',
  S41:'#ab2626',S42:'#cb6418',S45:'#c97a2f',S46:'#c97a2f',S47:'#c97a2f',
};
const DARK_FG = new Set(['U4','S5','S7','S8','S25']);

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let stationId   = '900003201';
let stationName = 'Berlin Hauptbahnhof';
let tab         = 'departures';
let filters     = Object.fromEntries(FILTER_DEFS.map(f => [f.key, true]));
let depAbort    = null;
let radarAbort  = null;
let refreshTimer= null;
let map         = null;
let stationMarker = null;
let vehicleMarkers = {};  // tripId -> L.circleMarker
let searchTimer = null;

/* ══════════════════════════════════════════
   CLOCK
══════════════════════════════════════════ */
function tick() {
  const t = new Date();
  document.getElementById('clock').textContent =
    t.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(tick, 1000); tick();

/* ══════════════════════════════════════════
   MAP INIT
══════════════════════════════════════════ */
function initMap() {
  map = L.map('map', {zoomControl:true, attributionControl:true})
         .setView([52.52, 13.405], 12);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; OSM &copy; CARTO',
    subdomains:'abcd', maxZoom:19
  }).addTo(map);
}

function setStationMarker(lat, lon, name) {
  if (stationMarker) stationMarker.remove();
  stationMarker = L.circleMarker([lat, lon], {
    radius:10, color:'#58a6ff', fillColor:'#58a6ff',
    fillOpacity:.35, weight:2
  }).addTo(map).bindTooltip(name, {permanent:false});
  map.setView([lat, lon], Math.max(map.getZoom(), 13), {animate:true});
}

function updateVehicleLayer(movements) {
  const seen = new Set();

  movements.forEach(m => {
    if (!m.line || !m.location) return;
    const product = m.line.product;
    if (!filters[product]) return;          // filtered out

    const id  = m.tripId || (m.line.name + m.direction);
    const lat = m.location.latitude;
    const lon = m.location.longitude;
    const lname = m.line.name || '?';
    const bg  = LINE_COLORS[lname] || productColor(product);
    const fg  = DARK_FG.has(lname) ? '#000' : '#fff';

    seen.add(id);

    if (vehicleMarkers[id]) {
      vehicleMarkers[id].setLatLng([lat, lon]);
    } else {
      const icon = L.divIcon({
        className:'veh-label',
        html:`<span style="background:${bg};color:${fg};padding:1px 5px;border-radius:4px;font-size:10px;font-weight:800">${lname}</span>`,
        iconAnchor:[18,10]
      });
      vehicleMarkers[id] = L.marker([lat, lon], {icon})
        .addTo(map)
        .bindTooltip(lname + (m.direction ? ' → '+m.direction : ''), {sticky:true});
    }
  });

  // Remove stale markers
  Object.keys(vehicleMarkers).forEach(id => {
    if (!seen.has(id)) { vehicleMarkers[id].remove(); delete vehicleMarkers[id]; }
  });
}

function productColor(p) {
  return {subway:'#224f9e',suburban:'#007734',bus:'#8b5ca3',
          tram:'#cc2222',regional:'#ef7c00',ferry:'#0a5f98'}[p] || '#444';
}

/* ══════════════════════════════════════════
   FILTER CHIPS
══════════════════════════════════════════ */
function renderFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = FILTER_DEFS.map(f => {
    const on = filters[f.key];
    return `<div class="filter-chip ${on?'on':'off'}"
               style="${on ? `background:${f.color};color:${f.fg};border-color:${f.color}` : ''}"
               onclick="toggleFilter('${f.key}')">${f.label}</div>`;
  }).join('');
}

function toggleFilter(key) {
  filters[key] = !filters[key];
  renderFilters();
  // Hide/show matching vehicle markers immediately
  Object.keys(vehicleMarkers).forEach(id => {
    // product is embedded in the marker via dataset not easily retrievable,
    // so just re-fetch radar to redraw
  });
  loadAll();
}

/* ══════════════════════════════════════════
   FAVOURITES
══════════════════════════════════════════ */
function renderFavs() {
  document.getElementById('favs').innerHTML = FAVS.map(s =>
    `<button class="fav-btn ${s.id===stationId?'active':''}" onclick="loadStation('${s.id}','${s.name}')">${s.name}</button>`
  ).join('');
}

/* ══════════════════════════════════════════
   SEARCH
══════════════════════════════════════════ */
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  if (q.length < 2) { searchResults.classList.remove('open'); return; }
  searchTimer = setTimeout(() => doSearch(q), 300);
});
document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) searchResults.classList.remove('open');
});

async function doSearch(q) {
  try {
    const r = await fetch(`${API}/locations?query=${encodeURIComponent(q)}&results=7&stops=true&addresses=false&poi=false`);
    const data = await r.json();
    const stops = data.filter(d => d.type === 'stop');
    searchResults.innerHTML = stops.length
      ? stops.map(s => `<div class="sr-item" onclick="loadStation('${s.id}','${s.name}');searchInput.value='';searchResults.classList.remove('open')">
          <div><div class="sr-name">${s.name}</div><div class="sr-sub">${Object.keys(s.products||{}).filter(k=>s.products[k]).join(' · ')}</div></div>
        </div>`).join('')
      : '<div class="sr-item"><span style="color:var(--muted)">Keine Ergebnisse</span></div>';
    searchResults.classList.add('open');
  } catch {}
}

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function lineBadge(line) {
  if (!line) return '<span class="line-badge" style="background:#333;color:#fff">?</span>';
  const n = line.name || '?';
  const bg = LINE_COLORS[n] || productColor(line.product) || '#444';
  const fg = DARK_FG.has(n) ? '#000' : '#fff';
  return `<span class="line-badge" style="background:${bg};color:${fg}">${n}</span>`;
}

function fmtTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
}

function minsUntil(iso) {
  if (!iso) return null;
  return Math.round((new Date(iso) - Date.now()) / 60000);
}

function countdown(m) {
  if (m === null) return '';
  if (m <= 0)  return `<span class="countdown cnt-now">Jetzt</span>`;
  if (m <= 5)  return `<span class="countdown cnt-soon">${m} min</span>`;
  return `<span class="countdown cnt-later">${m} min</span>`;
}

function delaySuffix(planned, actual) {
  if (!planned || !actual) return '';
  const d = Math.round((new Date(actual) - new Date(planned)) / 60000);
  if (d > 1)  return `<span class="delay late">+${d}'</span>`;
  if (d <= 0) return `<span class="delay ok">✓</span>`;
  return '';
}

/* ══════════════════════════════════════════
   FETCH DEPARTURES
══════════════════════════════════════════ */
async function fetchDeps(id, type) {
  if (depAbort) depAbort.abort();
  depAbort = new AbortController();

  const activeFilters = FILTER_DEFS.filter(f => filters[f.key]).map(f => f.key+'=true').join('&');
  const inactiveFilters = FILTER_DEFS.filter(f => !filters[f.key]).map(f => f.key+'=false').join('&');
  const filterQS = [activeFilters, inactiveFilters].filter(Boolean).join('&');

  const endpoint = type === 'departures' ? 'departures' : 'arrivals';
  const res = await fetch(
    `${API}/stops/${id}/${endpoint}?duration=60&results=30&${filterQS}`,
    {signal: depAbort.signal}
  );
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return data[endpoint] || data;
}

function renderBoard(deps, type) {
  if (!deps.length)
    return '<div class="empty-state" style="color:var(--muted)">Keine Abfahrten gefunden</div>';

  const dir = type === 'departures' ? 'Richtung' : 'Von';
  let html = `<table class="dep-table"><thead><tr>
    <th>Linie</th><th>${dir}</th>
    <th style="text-align:right">Plan</th>
    <th style="text-align:center">In</th>
    <th style="text-align:center">Gleis</th>
  </tr></thead><tbody>`;

  deps.slice(0, 22).forEach(d => {
    const when    = d.when || d.plannedWhen;
    const planned = d.plannedWhen;
    const dest    = type === 'departures' ? (d.direction||'—') : (d.origin?.name||'—');
    const plat    = d.plannedPlatform || d.platform || '—';
    const mins    = minsUntil(when);
    html += `<tr class="dep-row">
      <td>${lineBadge(d.line)}</td>
      <td class="dest" title="${dest}">${dest}</td>
      <td class="time-cell">${fmtTime(planned)}${delaySuffix(planned,d.when)}</td>
      <td style="text-align:center">${countdown(mins)}</td>
      <td class="plat">${plat}</td>
    </tr>`;
  });
  return html + '</tbody></table>';
}

/* ══════════════════════════════════════════
   FETCH RADAR
══════════════════════════════════════════ */
async function fetchRadar() {
  if (radarAbort) radarAbort.abort();
  radarAbort = new AbortController();

  const {north,west,south,east} = RADAR_BBOX;
  const res = await fetch(
    `${API}/radar?north=${north}&west=${west}&south=${south}&east=${east}&results=256&duration=30&frames=1&polylines=false`,
    {signal: radarAbort.signal}
  );
  if (!res.ok) return;
  const data = await res.json();
  updateVehicleLayer(data.movements || []);
}

/* ══════════════════════════════════════════
   LOAD ALL
══════════════════════════════════════════ */
async function loadAll() {
  clearTimeout(refreshTimer);

  // Fetch deps + radar in parallel
  const [depsResult] = await Promise.allSettled([
    fetchDeps(stationId, tab),
    fetchRadar()
  ]);

  const board = document.getElementById('board');
  if (depsResult.status === 'fulfilled') {
    board.innerHTML = renderBoard(depsResult.value, tab);
  } else if (depsResult.reason?.name !== 'AbortError') {
    const isCors = location.protocol === 'file:';
    board.innerHTML = isCors
      ? `<div class="error-state">⚠ CORS-Fehler beim Laden.<code>python3 -m http.server 8080</code>Dann: http://localhost:8080</div>`
      : `<div class="error-state">⚠ ${depsResult.reason?.message}</div>`;
  }

  refreshTimer = setTimeout(loadAll, REFRESH_MS);
}

/* ══════════════════════════════════════════
   LOAD STATION
══════════════════════════════════════════ */
async function loadStation(id, name) {
  stationId   = id;
  stationName = name;
  document.getElementById('stationName').textContent = name;
  document.getElementById('stationMeta').textContent = `Stop ID: ${id}`;
  document.getElementById('board').innerHTML =
    '<div class="loading-state"><div class="spinner"></div><span>Lade…</span></div>';
  renderFavs();

  // Try to get station coordinates for map
  try {
    const r = await fetch(`${API}/stops/${id}`);
    const s = await r.json();
    if (s.location) setStationMarker(s.location.latitude, s.location.longitude, name);
  } catch {}

  loadAll();
}

/* ══════════════════════════════════════════
   TABS
══════════════════════════════════════════ */
function switchTab(t) {
  tab = t;
  document.querySelectorAll('.tab-btn').forEach((b,i) =>
    b.classList.toggle('active', (i===0&&t==='departures')||(i===1&&t==='arrivals'))
  );
  loadAll();
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
initMap();
renderFavs();
renderFilters();
loadStation(stationId, stationName);
</script>
</body>
</html>
