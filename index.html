<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Transit Board</title>
  <style>
:root {
  --bg:        #001030;
  --panel:     #001d50;
  --hdr:       #001640;
  --row-next:  #0057b5;
  --sep:       rgba(255,255,255,0.1);
  --text:      #ffffff;
  --sub:       rgba(255,255,255,0.55);
  --green:     #5cff7a;
  --red:       #ff5252;
  --yellow:    #ffcc44;
  --font:      'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

/* ══════ MAIN ══════ */
#main { display: flex; flex-direction: column; height: 100%; background: var(--panel); }

/* HEADER */
.b-header {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 14px;
  padding: 12px 20px;
  background: var(--hdr);
  border-bottom: 1px solid var(--sep);
}
.bh-left { flex: 1; min-width: 0; }
.bh-station {
  font-size: 17px; font-weight: 700; line-height: 1.2;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bh-meta { font-size: 11px; color: var(--sub); margin-top: 2px; }
.bh-clock {
  font-size: 28px; font-weight: 300;
  font-variant-numeric: tabular-nums;
  letter-spacing: -.5px;
  flex-shrink: 0;
}

/* COL LABELS */
.col-labels {
  flex-shrink: 0;
  display: grid; grid-template-columns: 52px 1fr 88px;
  padding: 4px 20px;
  background: #001234;
  border-bottom: 1px solid var(--sep);
  font-size: 9px; letter-spacing: .2em;
  text-transform: uppercase; color: var(--sub);
}
.col-labels span:last-child { text-align: right; }

/* BOARD */
.b-scroll {
  flex: 1; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.12) transparent;
}
.b-scroll::-webkit-scrollbar { width: 3px; }
.b-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); }
#board {}

/* ── NEXT ROW ── */
.dep-next {
  display: flex; align-items: center; gap: 16px;
  padding: 18px 20px;
  background: var(--row-next);
  border-bottom: 2px solid rgba(255,255,255,.18);
  animation: fadeIn .25s ease;
}
.dep-next .badge {
  width: 54px; height: 54px;
  font-size: 15px; border-radius: 6px;
  flex-shrink: 0;
}
.dep-next .d-info { flex: 1; min-width: 0; }
.dep-next .d-dest {
  font-size: 20px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.2;
}
.dep-next .d-time { font-size: 12px; color: rgba(255,255,255,.65); margin-top: 4px; }
.dep-next .d-eta { flex-shrink: 0; text-align: right; }
.dep-next .eta-num { font-size: 32px; font-weight: 700; line-height: 1; }
.dep-next .eta-lbl { font-size: 11px; color: rgba(255,255,255,.6); margin-top: 2px; }

/* ── REGULAR ROWS ── */
.dep-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 20px;
  border-bottom: 1px solid var(--sep);
  transition: background .1s;
  animation: fadeIn .2s ease;
}
.dep-row:hover { background: rgba(255,255,255,.05); }
.dep-row .badge {
  width: 44px; height: 44px;
  font-size: 13px; border-radius: 5px;
  flex-shrink: 0;
}
.dep-row .d-info { flex: 1; min-width: 0; }
.dep-row .d-dest { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dep-row .d-time { font-size: 11px; color: var(--sub); margin-top: 2px; }
.dep-row .d-eta { flex-shrink: 0; text-align: right; min-width: 60px; }
.dep-row .eta-num { font-size: 17px; font-weight: 700; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

/* ── BADGE ── */
.badge {
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; color: #fff;
}

/* ── DELAY ── */
.d-delay { font-size: 10px; }
.d-delay.late { color: var(--red); }
.d-delay.ok   { color: var(--green); }

/* ── ETA colours ── */
.eta-now  { color: var(--red); animation: blink 1s infinite; }
.eta-soon { color: var(--yellow); }
@keyframes blink { 50% { opacity: .25; } }

/* ── STATE ── */
.state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; padding: 60px 24px;
  font-size: 13px; color: var(--sub);
  text-align: center; line-height: 1.8;
}
.spinner {
  width: 24px; height: 24px;
  border: 2px solid rgba(255,255,255,.2);
  border-top-color: #fff;
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── FOOTER ── */
footer {
  flex-shrink: 0; height: 26px;
  display: flex; align-items: center;
  padding: 0 20px; gap: 8px;
  background: #001234; border-top: 1px solid var(--sep);
  font-size: 10px; color: var(--sub);
}
footer span:first-child { flex: 1; }
  </style>
</head>
<body>

<!-- ══════ MAIN BOARD ══════ -->
<div id="main">

  <div class="b-header">
    <div class="bh-left">
      <div class="bh-station" id="stationName">—</div>
      <div class="bh-meta"   id="stationMeta"></div>
    </div>
    <div class="bh-clock" id="clock">--:--</div>
  </div>

  <div class="col-labels">
    <span>Line</span>
    <span>Destination</span>
    <span>ETA</span>
  </div>

  <div class="b-scroll">
    <div id="board">
      <div class="state"><div class="spinner"></div>Searching for stops…</div>
    </div>
  </div>

  <footer>
    <span id="ftrApi">—</span>
    <span id="ftrTime">—</span>
  </footer>

</div>

<script>
'use strict';

const RADIUS_M   = 1000;
const REFRESH_MS = 30_000;

let userLat, userLon, cc;
let currentStop = null, refreshTimer = null;

/* ── Clock ── */
function tick() {
  const el = document.getElementById('clock');
  if (el) el.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
}
setInterval(tick, 1000); tick();

/* ── Auto-locate on load ── */
function startLocating() {
  showState('loading');
  document.getElementById('stationName').textContent = 'Detecting location…';
  document.getElementById('stationMeta').textContent = '';

  if (!navigator.geolocation) {
    showState('Geolocation is not supported by this browser.');
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => { userLat = pos.coords.latitude; userLon = pos.coords.longitude; init(); },
    err => showState('Could not detect location:\n' + (err.message || 'Permission denied')),
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 30000 }
  );
}

/* ── Init ── */
async function init() {
  showState('loading');
  try {
    const geo = await reverseGeocode(userLat, userLon);
    cc = geo.cc;
    document.getElementById('ftrApi').textContent = 'Data: ' + apiLabel(cc);

    const stop = await findNearestStop(userLat, userLon, cc);
    if (!stop) {
      showState(`No transit stop found within ${RADIUS_M} m.\nTry moving closer to a stop.`);
      return;
    }

    currentStop = stop;
    document.getElementById('stationName').textContent = stop.name;
    document.getElementById('stationMeta').textContent =
      `📍 ${Math.round(stop.dist)} m away`;

    loadDepartures();
  } catch (e) {
    showState('Error: ' + e.message);
  }
}

/* ── Reverse geocode ── */
async function reverseGeocode(lat, lon) {
  const r = await fetch(
    `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=en`,
    { headers: { 'User-Agent': 'TransitBoard/1.0 (giladcameo)' } }
  );
  const d = await r.json();
  return { cc: (d.address?.country_code || 'xx').toUpperCase() };
}

function apiLabel(cc) {
  return { DE: 'DB · transport.rest', AT: 'DB · transport.rest',
           CH: 'transport.opendata.ch', IL: 'Open Bus · Hasadna' }[cc]
         || 'OpenStreetMap';
}

/* ── Haversine ── */
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000, r = Math.PI / 180;
  const dLat = (lat2 - lat1) * r, dLon = (lon2 - lon1) * r;
  const a = Math.sin(dLat / 2) ** 2
          + Math.cos(lat1 * r) * Math.cos(lat2 * r) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

/* ── Find nearest stop ── */
async function findNearestStop(lat, lon, cc) {
  if (cc === 'DE' || cc === 'AT') return nearestDB(lat, lon);
  if (cc === 'CH')                return nearestSwiss(lat, lon);
  if (cc === 'IL')                return nearestIsrael(lat, lon);
  return nearestOverpass(lat, lon);
}

async function nearestDB(lat, lon) {
  const r = await fetch(
    `https://v6.db.transport.rest/stops/nearby?latitude=${lat}&longitude=${lon}&results=5&distance=${RADIUS_M}`
  );
  const data = await r.json();
  const s = (Array.isArray(data) ? data : []).find(s => (s.distance ?? Infinity) <= RADIUS_M);
  return s ? { id: s.id, name: s.name, dist: s.distance, src: 'db' } : null;
}

async function nearestSwiss(lat, lon) {
  const r = await fetch(
    `https://transport.opendata.ch/v1/locations?x=${lon}&y=${lat}&type=station&limit=8`
  );
  const { stations = [] } = await r.json();
  let best = null, bestD = Infinity;
  for (const s of stations) {
    if (!s.id || !s.coordinate) continue;
    const d = haversine(lat, lon, s.coordinate.y, s.coordinate.x);
    if (d < bestD && d <= RADIUS_M) { bestD = d; best = s; }
  }
  return best ? { id: best.id, name: best.name, dist: bestD, src: 'ch' } : null;
}

async function nearestIsrael(lat, lon) {
  const D = 0.006;
  const r = await fetch(
    `https://open-bus-stride-api.hasadna.org.il/gtfs-stops/list?` +
    `stop_lat_from=${lat - D}&stop_lat_to=${lat + D}` +
    `&stop_lon_from=${lon - D}&stop_lon_to=${lon + D}&limit=30`
  );
  const data = await r.json();
  const items = Array.isArray(data) ? data : (data.items || []);
  let best = null, bestD = Infinity;
  for (const s of items) {
    if (!s.stop_lat || !s.stop_lon) continue;
    const d = haversine(lat, lon, +s.stop_lat, +s.stop_lon);
    if (d < bestD && d <= RADIUS_M) { bestD = d; best = s; }
  }
  return best
    ? { id: String(best.stop_code || best.id), name: best.stop_name || best.stop_name_heb, dist: bestD, src: 'il' }
    : null;
}

async function nearestOverpass(lat, lon) {
  const body =
    `[out:json][timeout:10];(` +
    `node["public_transport"="stop_position"](around:${RADIUS_M},${lat},${lon});` +
    `node["highway"="bus_stop"](around:${RADIUS_M},${lat},${lon});` +
    `node["railway"="station"](around:${RADIUS_M},${lat},${lon});` +
    `node["railway"="tram_stop"](around:${RADIUS_M},${lat},${lon});` +
    `);out body;`;
  const r = await fetch('https://overpass-api.de/api/interpreter', {
    method: 'POST', body: 'data=' + encodeURIComponent(body)
  });
  const data = await r.json();
  let best = null, bestD = Infinity;
  for (const e of data.elements || []) {
    if (!e.lat || !e.lon || !e.tags?.name) continue;
    const d = haversine(lat, lon, e.lat, e.lon);
    if (d < bestD) { bestD = d; best = e; }
  }
  return best
    ? { id: String(best.tags?.ref || best.id), name: best.tags.name, dist: bestD, src: 'osm' }
    : null;
}

/* ── Load departures ── */
async function loadDepartures() {
  if (!currentStop) return;
  clearTimeout(refreshTimer);

  try {
    let deps;
    if      (currentStop.src === 'db')  deps = await fetchDepsDB(currentStop.id);
    else if (currentStop.src === 'ch')  deps = await fetchDepsCH(currentStop.id);
    else if (currentStop.src === 'il')  deps = await fetchDepsIL(currentStop.id);
    else {
      showState(
        `Real-time data is not yet supported for this region.\n\n` +
        `Supported: Germany · Austria · Switzerland · Israel`
      );
      return;
    }
    renderBoard(deps);
    document.getElementById('ftrTime').textContent =
      'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  } catch (e) {
    showState('Error loading departures:\n' + e.message);
  }

  refreshTimer = setTimeout(loadDepartures, REFRESH_MS);
}

/* ── Fetch: DB ── */
async function fetchDepsDB(id) {
  const r = await fetch(
    `https://v6.db.transport.rest/stops/${encodeURIComponent(id)}/departures?duration=60&results=20`
  );
  const data = await r.json();
  return (data.departures || (Array.isArray(data) ? data : [])).map(d => ({
    line: d.line?.name, product: d.line?.product,
    dest: d.direction || d.destination?.name,
    planned: d.plannedWhen, actual: d.when,
  }));
}

/* ── Fetch: Switzerland ── */
async function fetchDepsCH(id) {
  const r = await fetch(
    `https://transport.opendata.ch/v1/stationboard?id=${encodeURIComponent(id)}&limit=20`
  );
  const { stationboard = [] } = await r.json();
  return stationboard.map(d => ({
    line: d.number, product: d.category?.toLowerCase(),
    dest: d.to,
    planned: d.stop?.departure,
    actual:  d.stop?.prognosis?.departure || d.stop?.departure,
  }));
}

/* ── Fetch: Israel ── */
async function fetchDepsIL(stopCode) {
  const now = new Date();
  const to  = new Date(now.getTime() + 90 * 60_000);
  const r = await fetch(
    `https://open-bus-stride-api.hasadna.org.il/gtfs-stop-times/list?` +
    `stop_code=${encodeURIComponent(stopCode)}` +
    `&arrival_time_from=${encodeURIComponent(now.toISOString())}` +
    `&arrival_time_to=${encodeURIComponent(to.toISOString())}` +
    `&limit=20&order_by=arrival_time`
  );
  const data = await r.json();
  return (Array.isArray(data) ? data : (data.items || [])).map(d => ({
    line:    d.route_short_name || '?',
    product: 'bus',
    dest:    d.trip_headsign || d.stop_headsign || '?',
    planned: d.arrival_time || d.departure_time,
    actual:  d.actual_arrival_time || d.arrival_time,
  }));
}

/* ── Render board ── */
function renderBoard(deps) {
  const board = document.getElementById('board');
  if (!deps.length) {
    board.innerHTML = '<div class="state">No departures in the next hour</div>';
    return;
  }
  const now = Date.now();
  const [first, ...rest] = deps.slice(0, 20);
  board.innerHTML = buildNextRow(first, now) + rest.map(d => buildRow(d, now)).join('');
}

function buildNextRow(d, now) {
  const eta = etaMins(d.actual || d.planned, now);
  return `
  <div class="dep-next">
    <div class="badge" style="background:${bg(d)};color:${fg(d)}">${h(d.line || '?')}</div>
    <div class="d-info">
      <div class="d-dest">${h(d.dest || '?')}</div>
      <div class="d-time">${fmtTime(d.planned)}${delayText(d)}</div>
    </div>
    <div class="d-eta">
      ${etaHtmlBig(eta)}
    </div>
  </div>`;
}

function buildRow(d, now) {
  const eta = etaMins(d.actual || d.planned, now);
  return `
  <div class="dep-row">
    <div class="badge" style="background:${bg(d)};color:${fg(d)}">${h(d.line || '?')}</div>
    <div class="d-info">
      <div class="d-dest">${h(d.dest || '?')}</div>
      <div class="d-time" style="font-size:11px;color:rgba(255,255,255,.55)">${fmtTime(d.planned)}${delayText(d)}</div>
    </div>
    <div class="d-eta">${etaHtmlSmall(eta)}</div>
  </div>`;
}

function etaHtmlBig(m) {
  if (m === null)  return '';
  if (m <= 0) return `<div class="eta-num eta-now">NOW</div>`;
  return `<div class="eta-num ${m <= 5 ? 'eta-soon' : ''}">${m}</div>
          <div class="eta-lbl">min</div>`;
}

function etaHtmlSmall(m) {
  if (m === null)  return '';
  if (m <= 0) return `<div class="eta-num eta-now" style="font-size:17px">NOW</div>`;
  return `<div class="eta-num ${m <= 5 ? 'eta-soon' : ''}" style="font-size:17px">${m} <span style="font-size:11px;font-weight:400;color:rgba(255,255,255,.5)">min</span></div>`;
}

function delayText(d) {
  if (!d.planned || !d.actual) return '';
  const m = Math.round((new Date(d.actual) - new Date(d.planned)) / 60000);
  if (m > 1)  return ` <span class="d-delay late">+${m}'</span>`;
  if (m <= 0) return ` <span class="d-delay ok">✓</span>`;
  return '';
}

/* ── Line badge colours ── */
const LINE_COLORS = {
  U1:'#55a822',U2:'#dd6e14',U3:'#16683d',U4:'#f0d722',
  U5:'#7d4427',U6:'#8b5ca3',U7:'#528dba',U8:'#224f9e',U9:'#f7931e',
  S1:'#da6ba2',S2:'#007734',S3:'#0a5f98',S5:'#ef7c00',
  S7:'#775e38',S8:'#55a822',S9:'#990000',S25:'#007734',
  S41:'#ab2626',S42:'#cb6418',S45:'#c97a2f',S47:'#007734',
};
const DARK_FG    = new Set(['U4','S5','S7','S8','S25']);
const PRODUCT_BG = {
  subway:'#224f9e', suburban:'#007734', tram:'#cc2222',
  bus:'#6e3fa3', regional:'#ef7c00', ferry:'#0a5f98',
  s:'#007734', r:'#ef7c00', ic:'#cc2222', t:'#cc2222',
};

function bg(d) {
  const n = (d.line || '').toUpperCase();
  return LINE_COLORS[n] || PRODUCT_BG[d.product] || '#334466';
}
function fg(d) {
  return DARK_FG.has((d.line || '').toUpperCase()) ? '#000' : '#fff';
}

/* ── Helpers ── */
function etaMins(iso, now) {
  if (!iso) return null;
  try {
    // Handle HH:MM:SS (Israel GTFS)
    if (/^\d{1,2}:\d{2}(:\d{2})?$/.test(iso)) return null;
    return Math.round((new Date(iso) - now) / 60000);
  } catch { return null; }
}

function fmtTime(iso) {
  if (!iso) return '—';
  if (/^\d{1,2}:\d{2}(:\d{2})?$/.test(iso)) return iso.slice(0, 5);
  try { return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false }); }
  catch { return iso.slice(11, 16) || '—'; }
}

function showState(msg) {
  const board = document.getElementById('board');
  if (msg === 'loading') {
    board.innerHTML = '<div class="state"><div class="spinner"></div>Detecting location…</div>';
  } else {
    board.innerHTML = `<div class="state">${h(msg)}</div>`;
  }
}

function h(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Start immediately ── */
startLocating();
</script>
</body>
</html>
